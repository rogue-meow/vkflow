name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: "3.12"
          extras: ""

      - name: Patch README for PyPI
        run: |
          sed -i '/<picture>/,/<\/picture>/c\    <img alt="VKFlow" src="https://raw.githubusercontent.com/rogue-meow/vkflow/main/docs/assets/logo-dark.svg" width="120">' README.md

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
