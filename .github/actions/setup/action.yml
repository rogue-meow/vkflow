name: "Setup vkflow"
description: "Setup Python, uv, and install dependencies"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  extras:
    description: "Optional dependency groups to install (comma-separated)"
    required: false
    default: "dev"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        if [ -n "${{ inputs.extras }}" ]; then
          uv pip install --system -e ".[${{ inputs.extras }}]"
        else
          uv pip install --system -e "."
        fi
