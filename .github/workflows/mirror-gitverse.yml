name: Mirror to GitVerse

on:
  push:
    branches: [main, gh-pages]

jobs:
  mirror:
    name: Mirror to GitVerse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitVerse
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote add gitverse https://oauth2:${GITVERSE_TOKEN}@gitverse.ru/rogue/vkflow.git

          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "gh-pages" ]; then
            touch .nojekyll
            git add .nojekyll
            git diff --cached --quiet || git commit -m "mirror: add .nojekyll"
            git push gitverse HEAD:gv-pages --force
          else
            git checkout -b gitverse-mirror
            git rm -r --cached .github
            git commit -m "mirror: remove .github"
            git push gitverse gitverse-mirror:main --force
          fi
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
